# ============================================================
# Docker Compose - Hệ thống Quản lý Thiết bị Dạy học
# ============================================================
# Khởi chạy: docker-compose up -d
# Chạy migration: docker-compose exec app php artisan migrate --seed
# ============================================================

version: '3.8'

services:
  # === PHP Application ===
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: equipment_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - equipment_network
    depends_on:
      - db

  # === Nginx Web Server ===
  webserver:
    image: nginx:alpine
    container_name: equipment_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - equipment_network
    depends_on:
      - app

  # === MySQL Database ===
  db:
    image: mysql:8.0
    container_name: equipment_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: equipment_management
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: equipment_user
      MYSQL_PASSWORD: equipment_pass
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - equipment_network

networks:
  equipment_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
